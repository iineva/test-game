name: Build Vite Projects

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-vite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project_dir:
          - game-demo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.project_dir }}
        run: npm ci

      - name: Build Vite project
        working-directory: ${{ matrix.project_dir }}
        run: npm run build

      - name: Stage Vite project
        run: |
          mkdir -p "_site/${{ matrix.project_dir }}"
          cp -R "${{ matrix.project_dir }}/dist/." "_site/${{ matrix.project_dir }}/"

      - name: Upload Vite artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-${{ matrix.project_dir }}
          path: _site
