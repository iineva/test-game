name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-static:
    uses: ./.github/workflows/deploy-static.yml

  build-vite:
    uses: ./.github/workflows/deploy-vite.yml

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-static
      - build-vite
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download static artifacts
        uses: actions/download-artifact@v4
        with:
          path: _site
          pattern: static-*
          merge-multiple: true

      - name: Download Vite artifacts
        uses: actions/download-artifact@v4
        with:
          path: _site
          pattern: vite-*
          merge-multiple: true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Disable Jekyll processing
        run: touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
